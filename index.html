<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Your Message</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: flex-start; /* start at the top */
      align-items: center;         /* centered horizontally */
      height: 100vh;
      margin: 0;
      padding-top: 20vh; /* pushes content down to about 1/3 from the top */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    /* Blurred background layer */
    #blur-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      filter: blur(20px) brightness(0.7);
      transform: scale(1.1);
      z-index: -2;
    }

    /* Sharp foreground image */
    #sharp-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -1;
    }

    #message {
      font-size: clamp(1.6rem, 4.5vw, 3rem) !important;
      max-width: 85%;
      text-align: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      backdrop-filter: blur(6px);
    }
  </style>
</head>

<body>

<div id="blur-bg"></div>
<div id="sharp-bg"></div>
<div id="message"></div>

<script>
// Add your image filenames here:
const images = [
  "saska.png",
  "saska2.png",
  "saska3.png",
  "saska4.png",
  "juni.png",
  "juni2.png",
  "houndels.png",
  "houndels2.png"
];

// Pick a random image
const randomImage = images[Math.floor(Math.random() * images.length)];

// Set blurred background
document.getElementById("blur-bg").style.backgroundImage = `url('${randomImage}')`;

// Set sharp foreground image
document.getElementById("sharp-bg").style.backgroundImage = `url('${randomImage}')`;

// Your messages
const messages = [
  "Be the basset: move slowly, but with the confidence of someone who knows snacks appear eventually.",
  "Your problems aren’t as heavy as a basset’s ears, and they carry those things like royalty.",
  "If today feels long, remember: bassets measure time in naps, not minutes.",
  "You are allowed to flop dramatically. It is, in fact, encouraged.",
  "Follow your nose. Unless it leads to trouble. Then pretend you were following vibes.",
  "You don’t need to hurry. Even gravity respects a basset’s pace.",
  "Your worth isn’t measured by productivity. It’s measured by how many people would boop your snoot.",
  "If you feel droopy, congratulations — you’re halfway to being majestic.",
  "The universe is vast, mysterious, and probably full of treats you haven’t found yet.",
  "You are not behind. You are simply on basset time: slow, soulful, and slightly confused.",
  "Take up space. Bassets do it without apology and with maximum surface area.",
  "You don’t need to have it all together. Even bassets trip over their own ears.",
  "Let your heart be soft, your ears be long, and your expectations be delightfully low-stakes.",
  "You are loved. Possibly more than a basset loves a warm sunbeam — which is saying something.",
  "Existence is strange. Lean into it like a basset leaning into a too-small dog bed."
];

const randomMessage = Math.floor(Math.random() * messages.length);
document.getElementById("message").innerText = messages[randomMessage];
</script>

</body>
</html>
